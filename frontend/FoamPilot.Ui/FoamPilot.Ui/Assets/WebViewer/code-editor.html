<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1e1e1e; }
  #editor-container { width: 100vw; height: 100vh; }
  #diff-container { width: 100vw; height: 100vh; display: none; }
</style>
</head>
<body>
<div id="editor-container"></div>
<div id="diff-container"></div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
<script>
  let editor = null;
  let diffEditor = null;
  let originalContent = '';
  let currentMode = 'edit'; // 'edit' or 'diff'

  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });

  require(['vs/editor/editor.main'], function () {
    // Register OpenFOAM-like language for basic highlighting
    monaco.languages.register({ id: 'openfoam' });
    monaco.languages.setMonarchTokensProvider('openfoam', {
      tokenizer: {
        root: [
          [/\/\/.*$/, 'comment'],
          [/\/\*/, 'comment', '@comment'],
          [/#\w+/, 'keyword'],
          [/\b(FoamFile|version|format|class|object|location)\b/, 'keyword'],
          [/\b(uniform|nonuniform|fixedValue|zeroGradient|inletOutlet|symmetryPlane|noSlip|wall|inlet|outlet|calculated|kqRWallFunction|omegaWallFunction|nutUSpaldingWallFunction)\b/, 'type'],
          [/\b(true|false|yes|no|on|off)\b/, 'constant'],
          [/\b\d+(\.\d+)?([eE][+-]?\d+)?\b/, 'number'],
          [/"[^"]*"/, 'string'],
          [/[{}()\[\]]/, 'delimiter'],
          [/\b[a-zA-Z_]\w*\b/, 'identifier'],
        ],
        comment: [
          [/[^/*]+/, 'comment'],
          [/\*\//, 'comment', '@pop'],
          [/[/*]/, 'comment'],
        ],
      },
    });

    monaco.editor.defineTheme('foampilot-dark', {
      base: 'vs-dark',
      inherit: true,
      rules: [
        { token: 'keyword', foreground: '569cd6', fontStyle: 'bold' },
        { token: 'type', foreground: '4ec9b0' },
        { token: 'number', foreground: 'b5cea8' },
        { token: 'string', foreground: 'ce9178' },
        { token: 'comment', foreground: '6a9955' },
        { token: 'constant', foreground: 'd4a0ff' },
      ],
      colors: {
        'editor.background': '#1e1e1e',
      },
    });

    editor = monaco.editor.create(document.getElementById('editor-container'), {
      value: '',
      language: 'openfoam',
      theme: 'foampilot-dark',
      automaticLayout: true,
      minimap: { enabled: false },
      lineNumbers: 'on',
      fontSize: 13,
      fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
      scrollBeyondLastLine: false,
      wordWrap: 'off',
      renderLineHighlight: 'all',
      bracketPairColorization: { enabled: true },
      folding: true,
      glyphMargin: true,
      readOnly: false,
    });

    // Notify host when content changes
    editor.onDidChangeModelContent(() => {
      if (window.chrome?.webview) {
        window.chrome.webview.postMessage(JSON.stringify({
          type: 'contentChanged',
          content: editor.getValue(),
          isDirty: editor.getValue() !== originalContent,
        }));
      }
    });

    // Listen for messages from C# host
    if (window.chrome?.webview) {
      window.chrome.webview.addEventListener('message', (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      });
      // Signal ready
      window.chrome.webview.postMessage(JSON.stringify({ type: 'ready' }));
    }
  });

  function handleMessage(data) {
    switch (data.action) {
      case 'setContent':
        originalContent = data.content || '';
        if (editor) {
          editor.setValue(data.content || '');
          editor.revealLine(1);
        }
        // Switch to edit mode
        if (currentMode === 'diff') toggleDiffMode(false);
        break;

      case 'getContent':
        if (window.chrome?.webview && editor) {
          window.chrome.webview.postMessage(JSON.stringify({
            type: 'content',
            content: editor.getValue(),
          }));
        }
        break;

      case 'showDiff':
        toggleDiffMode(true);
        break;

      case 'hideDiff':
        toggleDiffMode(false);
        break;

      case 'setReadOnly':
        if (editor) editor.updateOptions({ readOnly: !!data.value });
        break;
    }
  }

  function toggleDiffMode(show) {
    const editorDiv = document.getElementById('editor-container');
    const diffDiv = document.getElementById('diff-container');

    if (show && editor) {
      currentMode = 'diff';
      editorDiv.style.display = 'none';
      diffDiv.style.display = 'block';

      if (diffEditor) diffEditor.dispose();
      diffEditor = monaco.editor.createDiffEditor(diffDiv, {
        automaticLayout: true,
        theme: 'foampilot-dark',
        fontSize: 13,
        fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
        readOnly: true,
        renderSideBySide: true,
        minimap: { enabled: false },
      });

      diffEditor.setModel({
        original: monaco.editor.createModel(originalContent, 'openfoam'),
        modified: monaco.editor.createModel(editor.getValue(), 'openfoam'),
      });
    } else {
      currentMode = 'edit';
      editorDiv.style.display = 'block';
      diffDiv.style.display = 'none';
      if (diffEditor) { diffEditor.dispose(); diffEditor = null; }
    }
  }
</script>
</body>
</html>
