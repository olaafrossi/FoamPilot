<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoamPilot Mesh Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  #viewer { width: 100vw; height: 100vh; }
  #info {
    position: absolute; top: 12px; left: 12px;
    color: #ccc; font-size: 12px; line-height: 1.5;
    background: rgba(0,0,0,0.5); padding: 8px 12px;
    border-radius: 6px; pointer-events: none;
  }
  #loading {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #888; font-size: 16px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="viewer"></div>
<div id="info" class="hidden">
  <div id="stats"></div>
</div>
<div id="loading">Loading mesh...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

let scene, camera, renderer, controls, mesh;

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.getElementById('viewer').appendChild(renderer.domElement);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 10000);
  camera.position.set(5, 3, 5);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Lighting
  const ambient = new THREE.AmbientLight(0x404060, 1.5);
  scene.add(ambient);
  const dir1 = new THREE.DirectionalLight(0xffffff, 1.2);
  dir1.position.set(5, 10, 7);
  scene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0x8888ff, 0.4);
  dir2.position.set(-5, -3, -5);
  scene.add(dir2);

  // Grid
  const grid = new THREE.GridHelper(20, 20, 0x333355, 0x222244);
  scene.add(grid);

  // Axes
  const axes = new THREE.AxesHelper(2);
  scene.add(axes);

  window.addEventListener('resize', onResize);
  animate();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function fitCameraToObject(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * (Math.PI / 180);
  let dist = maxDim / (2 * Math.tan(fov / 2));
  dist *= 1.5;

  camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
  controls.target.copy(center);
  controls.update();

  camera.near = dist / 100;
  camera.far = dist * 100;
  camera.updateProjectionMatrix();
}

function showStats(geometry) {
  const tris = geometry.index ? geometry.index.count / 3 : geometry.attributes.position.count / 3;
  const verts = geometry.attributes.position.count;
  const box = new THREE.Box3().setFromBufferAttribute(geometry.attributes.position);
  const size = box.getSize(new THREE.Vector3());

  document.getElementById('stats').innerHTML =
    `Triangles: ${tris.toLocaleString()}<br>` +
    `Vertices: ${verts.toLocaleString()}<br>` +
    `Size: ${size.x.toFixed(2)} × ${size.y.toFixed(2)} × ${size.z.toFixed(2)}`;
  document.getElementById('info').classList.remove('hidden');
  document.getElementById('loading').classList.add('hidden');
}

function loadSTL(url) {
  const loader = new STLLoader();
  loader.load(url,
    (geometry) => {
      geometry.computeVertexNormals();
      const material = new THREE.MeshPhongMaterial({
        color: 0x4488cc,
        specular: 0x222222,
        shininess: 40,
        side: THREE.DoubleSide,
        flatShading: false,
      });
      if (mesh) scene.remove(mesh);
      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
      fitCameraToObject(mesh);
      showStats(geometry);
    },
    undefined,
    (err) => {
      document.getElementById('loading').textContent = 'Failed to load mesh: ' + err.message;
    }
  );
}

function loadOBJ(url) {
  const loader = new OBJLoader();
  loader.load(url,
    (obj) => {
      const material = new THREE.MeshPhongMaterial({
        color: 0x4488cc,
        specular: 0x222222,
        shininess: 40,
        side: THREE.DoubleSide,
      });
      obj.traverse((child) => {
        if (child.isMesh) {
          child.material = material;
          child.geometry.computeVertexNormals();
        }
      });
      if (mesh) scene.remove(mesh);
      mesh = obj;
      scene.add(mesh);
      fitCameraToObject(mesh);
      // Stats from first mesh child
      obj.traverse((child) => {
        if (child.isMesh) { showStats(child.geometry); return; }
      });
    },
    undefined,
    (err) => {
      document.getElementById('loading').textContent = 'Failed to load mesh: ' + err.message;
    }
  );
}

// Listen for messages from C# host
window.chrome?.webview?.addEventListener('message', (event) => {
  const data = JSON.parse(event.data);
  if (data.action === 'loadSTL') loadSTL(data.url);
  if (data.action === 'loadOBJ') loadOBJ(data.url);
  if (data.action === 'setBackground') {
    scene.background = new THREE.Color(data.color);
  }
});

init();

// If URL has a file param, auto-load
const params = new URLSearchParams(window.location.search);
const file = params.get('file');
if (file) {
  if (file.toLowerCase().endsWith('.obj') || file.toLowerCase().endsWith('.obj.gz')) {
    loadOBJ(file);
  } else {
    loadSTL(file);
  }
}
</script>
</body>
</html>
