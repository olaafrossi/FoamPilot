name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: olaafrossi/foampilot

jobs:
  # ── Electron Build (matrix: Windows, macOS, Linux) ──────────────────
  electron:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
          - os: ubuntu-latest
            artifact: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: electron-ui/package-lock.json

      - name: Install dependencies
        working-directory: electron-ui
        run: npm ci

      - name: Stamp version from tag into package.json
        if: github.ref_type == 'tag'
        working-directory: electron-ui
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build Electron app
        working-directory: electron-ui
        run: npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.artifact }}
          path: |
            electron-ui/dist-electron/*.exe
            electron-ui/dist-electron/*.dmg
            electron-ui/dist-electron/*.AppImage
            electron-ui/dist-electron/latest*.yml
          if-no-files-found: warn

  # ── Docker Build & Push to GHCR ─────────────────────────────────────
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.1-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/olaafrossi/FoamPilot
            org.opencontainers.image.description=FoamPilot OpenFOAM backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release (tag pushes only) ──────────────────────────
  release:
    needs: [electron, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all Electron artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts

      - name: Merge release files
        shell: bash
        run: |
          mkdir -p ./releases
          for dir in ./all-artifacts/electron-*/; do
            platform=$(basename "$dir" | sed 's/electron-//')
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              base=$(basename "$file")
              cp "$file" "./releases/${base}"
            done
          done
          ls -la ./releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./releases/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
