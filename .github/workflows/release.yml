name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: frontend/FoamPilot.Ui/FoamPilot.Ui/FoamPilot.Ui.csproj
  TFM: net10.0-desktop

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Strip leading 'v'
          else
            VERSION="0.0.1-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -f ${{ env.TFM }}
          -r ${{ matrix.rid }}
          -c Release
          --self-contained
          -o ./publish
          -p:Version=${{ steps.version.outputs.version }}

      # ── Code signing placeholder ──
      # Uncomment and configure when you have an OV certificate:
      #
      # - name: Sign binaries (Windows)
      #   if: matrix.rid == 'win-x64'
      #   run: |
      #     # Option A: SignTool with USB token / cloud HSM
      #     # signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /sha1 ${{ secrets.CERT_THUMBPRINT }} ./publish/FoamPilot.Ui.exe
      #     #
      #     # Option B: SSL.com eSigner (cloud signing)
      #     # vpk sign --signTool esigner --esignerUsername ${{ secrets.ESIGNER_USER }} --esignerPassword ${{ secrets.ESIGNER_PASS }} --esignerTotp ${{ secrets.ESIGNER_TOTP }}

      - name: Velopack Pack
        run: >
          vpk pack
          --packId FoamPilot
          --packVersion ${{ steps.version.outputs.version }}
          --packDir ./publish
          --outputDir ./releases
          --mainExe FoamPilot.Ui.exe

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: ./releases/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-releases

      - name: Merge release files
        shell: bash
        run: |
          mkdir -p ./releases
          for dir in ./all-releases/release-*/; do
            rid=$(basename "$dir" | sed 's/release-//')
            for file in "$dir"*; do
              base=$(basename "$file")
              # Prefix files with RID to avoid name collisions
              cp "$file" "./releases/${rid}-${base}"
            done
          done
          ls -la ./releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./releases/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
