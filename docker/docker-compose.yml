services:
  foampilot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../cases:/home/openfoam/run
      - ../templates:/home/openfoam/templates
      - ../backend:/app
    environment:
      FOAM_RUN: /home/openfoam/run
      FOAM_TEMPLATES: /home/openfoam/templates
      FOAM_CORES: ${FOAM_CORES:-10}
    deploy:
      resources:
        limits:
          cpus: "${DOCKER_CPUS:-10}"
          memory: "${DOCKER_MEMORY:-16g}"
